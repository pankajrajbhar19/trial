services:
  - type: web
    name: digital-catalyst
    env: python
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt && python init_render_db.py
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: digital-catalyst-db
          property: connectionString

databases:
  - name: digital-catalyst-db
    databaseName: digital_catalyst
    user: digital_catalyst_user
