services:
  - type: web
    name: digital-catalyst
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: digital-catalyst-db
          property: connectionString

databases:
  - name: digital-catalyst-db
    databaseName: digital_catalyst
    user: digital_catalyst_user
